<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços - Barbearia</title>
    <link rel="stylesheet" href="../css/servicos.css">
</head>

<body>

<header>
    <div class="container">
        <a class="botao" href="../html/index.html">Voltar</a>

        <img src="../img/logo.png" alt="Logo Barbearia" class="logo">

        <nav>
            <ul>
                <li><a href="../html/index.html">Home</a></li>
                <li><a href="../html/servicos.html">Serviços</a></li>

            </ul>
        </nav>

</header>

<main>
    <section class="produtos">

        <div class="card">
            <h2>Cabelo</h2>
            <img src="../img/cabelo.jpg" alt="Corte de cabelo">
            <p>Na tesoura ou máquina, como o cliente preferir.</p>
            <span>R$ 25.00</span>
        </div>

        <div class="card">
            <h2>Barba</h2>
            <img src="../img/barba.jpg" alt="Barba">
            <p>Corte e desenho profissional de barba.</p>
            <span>R$ 18.00</span>
        </div>

        <div class="card">
            <h2>Cabelo + Barba</h2>
            <img src="../img/cabelo+barba.jpg" alt="Cabelo e barba">
            <p>Pacote completo de cabelo e barba.</p>
