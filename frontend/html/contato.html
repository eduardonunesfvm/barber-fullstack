<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato & Agendamento</title>
    <link rel="stylesheet" href="../css/contato.css">
</head>

<body>

<header>
    <div class="container">
        <a class="botao" href="../html/index.html">Voltar</a>

        <img src="../img/logo.png" alt="Logo" class="logo">

        <nav>
            <ul>
                <li><a href="../html/index.html">Home</a></li>
                <li><a href="../html/servicos.html">Serviços</a></li>
                <li><a href="../html/contato.html">Contato</a></li>
            </ul>
        </nav>
    </div>
</header>

<main class="contato">

    <h1>Contato & Agendamento</h1>

    <form class="formulario">

        <input type="text" placeholder="Seu nome" required>

        <input type="tel" placeholder="Telefone" required>

        <select required>
            <option value="">Escolha o serviço</option>
            <option>Corte de Cabelo</option>
            <option>Barba</option>
            <option>Cabelo + Barba</option>
        </select>

        <input type="date" required>

        <input type="time" required>

        <textarea placeholder="Observações (opcional)"></textarea>

        <button type="submit">Agendar</button>

    </form>

</main>

</body>
</html>
