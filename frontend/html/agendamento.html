<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento</title>
    <link rel="stylesheet" href="../css/agendamento.css">
</head>

<body>

<header>
    <div class="container">
        <a class="botao" href="../html/index.html">Voltar</a>

        <img src="../img/logo.png" alt="Logo" class="logo">

        <nav>
            <ul>
                <li><a href="../html/index.html">Home</a></li>
                <li><a href="../html/servicos.html">Serviços</a></li>
                <li><a href="../html/contato.html">Contato</a></li>
            </ul>
        </nav>
    </div>
</header>

<main class="contato">

    <h1>Agendamento</h1>

    <div id="mensagem-erro" style="display:none; color: red; margin-bottom: 16px;"></div>
    <div id="mensagem-sucesso" style="display:none; color: green; margin-bottom: 16px;"></div>

    <form class="formulario" onsubmit="return false;">

        <!-- serviços carregados dinamicamente pela API -->
        <select id="servico-select" required>
            <option value="">Escolha o serviço</option>
        </select>

        <input id="data-agendamento" type="date" required>

        <input id="hora-agendamento" type="time" required>

        <button type="button" onclick="criarAgendamento()">Agendar</button>

    </form>

</main>


</body>
</html>
